<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiaSHi8 | Developer</title>
    <style>
        :root {
            --accent: #9d4edd; 
            --text: #ededed;
        }

        body { 
            background: #0a0a0a; 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Чтобы не было полос прокрутки из-за свечения */
        }

        /* Мягкое свечение за курсором */
        .cursor-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 350px;
            padding: 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, .subtitle, .btn {
            opacity: 0; /* Изначально скрыты для анимации */
            animation: fadeInUp 0.8s ease-out forwards;
        }

        /* Задержки для "лесенки" */
        h1 { animation-delay: 0.2s; font-size: 2rem; margin-bottom: 8px; }
        .subtitle { animation-delay: 0.4s; color: #888; letter-spacing: 2px; margin-bottom: 30px; }
        .btn:nth-child(1) { animation-delay: 0.6s; }
        .btn:nth-child(2) { animation-delay: 0.8s; }
        .btn:nth-child(3) { animation-delay: 1.0s; }

        .links { display: grid; gap: 15px; }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid rgba(157, 78, 221, 0.1);
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="cursor-glow" id="glow"></div>
    <div class="container">
        <h1>KiaSHi8</h1>
        <div class="subtitle">C# • Python • Kali Linux</div>
        <div class="links">
            <a class="btn" href="https://github.com" target="_blank">Military Trainer</a>
            <a class="btn" href="https://github.com" target="_blank">Network Scanner</a>
            <a class="btn" href="https://t.me" target="_blank">Telegram</a>
        </div>
    </div>

    <script>
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
